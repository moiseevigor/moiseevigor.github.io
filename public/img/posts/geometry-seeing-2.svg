<svg viewBox="0 0 220 148" xmlns="http://www.w3.org/2000/svg">
  <rect width="220" height="148" fill="#fff"/>
  <!-- Family of inflectional elastica curves (different modulus k) -->
  <!-- k≈0: nearly straight -->
  <path d="M 20,74 C 80,70 140,78 200,74"
        fill="none" stroke="#1565c0" stroke-width="1.2" opacity="0.18" stroke-linecap="round"/>
  <!-- k≈0.3 -->
  <path d="M 20,74 C 72,52 128,96 200,74"
        fill="none" stroke="#1565c0" stroke-width="1.5" opacity="0.38" stroke-linecap="round"/>
  <!-- k≈0.6 -->
  <path d="M 20,74 C 63,32 137,116 200,74"
        fill="none" stroke="#1565c0" stroke-width="1.8" opacity="0.62" stroke-linecap="round"/>
  <!-- k≈0.85 -->
  <path d="M 20,74 C 55,12 145,136 200,74"
        fill="none" stroke="#1565c0" stroke-width="2" opacity="0.84" stroke-linecap="round"/>
  <!-- k≈0.99 -->
  <path d="M 20,74 C 48,4 152,144 200,74"
        fill="none" stroke="#1565c0" stroke-width="2.2" opacity="1" stroke-linecap="round"/>
  <!-- Endpoints -->
  <circle cx="20"  cy="74" r="3.5" fill="#1565c0"/>
  <circle cx="200" cy="74" r="3.5" fill="#1565c0"/>
  <!-- Tangent direction arrows at inflection point (midway) -->
  <circle cx="110" cy="74" r="2" fill="#e65100" opacity="0.7"/>
</svg>
