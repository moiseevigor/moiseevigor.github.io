<svg viewBox="0 0 220 148" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0.5 L4,2.5 L0,4.5" fill="none" stroke="#999" stroke-width="0.8"/>
    </marker>
    <marker id="ah2" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0.5 L4,2.5 L0,4.5" fill="none" stroke="#e65100" stroke-width="0.8"/>
    </marker>
  </defs>
  <rect width="220" height="148" fill="#fff"/>

  <!-- Input -->
  <circle cx="110" cy="12" r="4" fill="#1565c0"/>
  <line x1="110" y1="16" x2="110" y2="34" stroke="#ccc" stroke-width="1.2" marker-end="url(#ah)"/>

  <!-- Block 1: Conv + BN + ReLU -->
  <rect x="68" y="36" width="84" height="24" rx="4" fill="#e8f0fe" stroke="#1565c0" stroke-width="1.1"/>
  <text x="110" y="51.5" text-anchor="middle"
        font-family="'Source Sans 3','Helvetica Neue',sans-serif"
        font-size="9" font-weight="700" fill="#1565c0">Conv · BN · ReLU</text>

  <!-- Arrow -->
  <line x1="110" y1="60" x2="110" y2="78" stroke="#ccc" stroke-width="1.2" marker-end="url(#ah)"/>

  <!-- Block 2: Conv + BN -->
  <rect x="68" y="80" width="84" height="24" rx="4" fill="#e8f0fe" stroke="#1565c0" stroke-width="1.1"/>
  <text x="110" y="95.5" text-anchor="middle"
        font-family="'Source Sans 3','Helvetica Neue',sans-serif"
        font-size="9" font-weight="700" fill="#1565c0">Conv · BN</text>

  <!-- Arrow to add -->
  <line x1="110" y1="104" x2="110" y2="120" stroke="#ccc" stroke-width="1.2"/>

  <!-- Add node -->
  <circle cx="110" cy="124" r="8" fill="#fff" stroke="#1565c0" stroke-width="1.4"/>
  <text x="110" y="128.5" text-anchor="middle"
        font-family="sans-serif" font-size="13" fill="#1565c0" font-weight="700">+</text>

  <!-- Output -->
  <line x1="110" y1="132" x2="110" y2="144" stroke="#ccc" stroke-width="1.2" marker-end="url(#ah)"/>

  <!-- Skip connection (orange dashed arc) -->
  <path d="M 110,16 C 172,16 172,124 118,124"
        fill="none" stroke="#e65100" stroke-width="1.4"
        stroke-dasharray="4,2.5" marker-end="url(#ah2)"/>
</svg>
