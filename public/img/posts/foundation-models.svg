<svg viewBox="0 0 220 148" xmlns="http://www.w3.org/2000/svg">
  <rect width="220" height="148" fill="#fff"/>
  <!-- Foundation model: inverted pyramid of layers (data → model) -->
  <!-- Widest at bottom (raw data), narrowest at top (emergent model) -->
  <rect x="18"  y="118" width="184" height="13" rx="3" fill="#e8f0fe" stroke="#c5d8fd" stroke-width="0.8"/>
  <rect x="28"  y="103" width="164" height="13" rx="3" fill="#d0e2fd" stroke="#aac6fc" stroke-width="0.8"/>
  <rect x="40"  y="88"  width="140" height="13" rx="3" fill="#b3ccfc" stroke="#85acfb" stroke-width="0.8"/>
  <rect x="54"  y="73"  width="112" height="13" rx="3" fill="#8ab4fb" stroke="#5a8ef9" stroke-width="0.8"/>
  <rect x="70"  y="58"  width="80"  height="13" rx="3" fill="#5190f6" stroke="#2567e8" stroke-width="0.8"/>
  <rect x="88"  y="43"  width="44"  height="13" rx="3" fill="#1f6be0" stroke="#1555ba" stroke-width="0.8"/>
  <!-- Output: single wide bar -->
  <rect x="80"  y="24"  width="60"  height="13" rx="3" fill="#1565c0" stroke="none"/>
  <text x="110" y="34.2" text-anchor="middle"
        font-family="'Source Sans 3','Helvetica Neue',sans-serif"
        font-size="7.5" font-weight="700" fill="#fff" letter-spacing="0.06em">FOUNDATION</text>
  <!-- Data dots at base -->
  <g fill="#c8d8f5" opacity="0.9">
    <circle cx="34"  cy="140" r="2"/>
    <circle cx="50"  cy="140" r="2"/>
    <circle cx="66"  cy="140" r="2"/>
    <circle cx="82"  cy="140" r="2"/>
    <circle cx="98"  cy="140" r="2"/>
    <circle cx="114" cy="140" r="2"/>
    <circle cx="130" cy="140" r="2"/>
    <circle cx="146" cy="140" r="2"/>
    <circle cx="162" cy="140" r="2"/>
    <circle cx="178" cy="140" r="2"/>
  </g>
</svg>
