---
layout: default
---

<!-- ── Static page header (same d-header chrome, but minimal — title only) ── -->
<div class="d-header">
  <h1 class="d-title">{{ page.title }}</h1>
  {% if page.subtitle %}
  <p class="d-subtitle">{{ page.subtitle }}</p>
  {% endif %}
</div>

<article class="d-article">
  <div class="l-body">
    {{ content }}
  </div>
</article>
