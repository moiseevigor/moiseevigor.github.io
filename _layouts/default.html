<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body class="layout-{{ page.layout | default: 'page' }}{% if page.page_class %} {{ page.page_class }}{% endif %}">

<!-- ── Top navigation (shared by every page) ── -->
<nav class="site-nav">
  <a class="site-nav-brand" href="/">{{ site.title }}</a>
  <ul class="site-nav-links">
    <li><a href="/"          {% if page.url == '/'             %}class="active"{% endif %}>Home</a></li>
    <li><a href="/about/"    {% if page.url contains 'about'    %}class="active"{% endif %}>About</a></li>
    <li><a href="/projects/" {% if page.url contains 'projects' %}class="active"{% endif %}>Projects</a></li>
    <li><a href="/archives/" {% if page.url contains 'archives' %}class="active"{% endif %}>Archives</a></li>
  </ul>
</nav>

<!-- ── Page content (each layout is responsible for its own d-header / d-article) ── -->
{{ content }}

<!-- ── Unified footer (the distill d-footer style, with social links) ── -->
<footer class="d-footer">
  <span>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}</span>
  <span class="d-dot">·</span>
  <a href="{{ site.url }}">{{ site.url | remove: 'https://' }}</a>
  <span class="d-dot">·</span>
  <a href="https://github.com/{{ site.github_username | default: 'moiseevigor' }}" rel="me">GitHub</a>
  <a href="https://twitter.com/moiseev_igor" rel="me">Twitter</a>
  <a href="https://www.linkedin.com/in/moiseevigor" rel="me">LinkedIn</a>
  {% if page.path %}
  <span class="d-dot">·</span>
  <a href="https://github.com/{{ site.github_username | default: 'moiseevigor' }}/{{ site.github_repo | default: 'moiseevigor.github.io' }}/edit/master/{{ page.path }}">Edit&nbsp;on&nbsp;GitHub</a>
  {% endif %}
</footer>

<script src="/public/js/codeblock.js"></script>
</body>
</html>
