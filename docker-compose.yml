services:

  # ── Local development server with live-reload ─────────────────────────────
  jekyll:
    build: .
    image: moiseevigor-blog:dev
    command: >
      bundle exec jekyll serve
        --host 0.0.0.0
        --port 4000
        --livereload
        --drafts
        --future
        --config _config.yml,_config.dev.yml
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    ports:
      - "4000:4000"   # Jekyll
      - "35729:35729" # LiveReload
    environment:
      JEKYLL_ENV: development
    stdin_open: true
    tty: true

  # ── One-shot production build ─────────────────────────────────────────────
  build:
    build: .
    image: moiseevigor-blog:dev
    command: >
      bundle exec jekyll build
        --config _config.yml
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    environment:
      JEKYLL_ENV: production
    profiles: [build]

  # ── HTMLProofer (matches CircleCI check) ─────────────────────────────────
  htmlproofer:
    build: .
    image: moiseevigor-blog:dev
    command: >
      bundle exec htmlproofer ./_site
        --only-4xx
        --ignore_urls "/example.com/,/ws-na.amazon-adsystem.com/,/molpharm.aspetjournals.org/,/^https://fonts\.googleapis\.com/,/^https://fonts\.gstatic\.com/,/^https://moiseevigor\.github\.io//"
        --ignore-status-codes "403,429"
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    profiles: [test]

volumes:
  bundle_cache:
